<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Bryan Tuer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="hero-page">

  <nav class="nav">
    <a href="index.html" class="nav-name"><span class="nav-name-first">Bryan </span><span class="nav-name-last">Tuer</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link" data-text="Home">Home<span class="cursor">_</span></a></li>
      <li><a href="work.html" class="nav-link" data-text="Work">Work<span class="cursor">_</span></a></li>
      <li><a href="play.html" class="nav-link" data-text="Play">Play<span class="cursor">_</span></a></li>
      <li><a href="contact.html" class="nav-link" data-text="Contact">Contact<span class="cursor">_</span></a></li>
    </ul>
  </nav>

  <div class="bg-wrap">
    <img src="assets/images/hero.jpg" alt="Baltimore rowhomes at sunset" class="hero-image" />
    <div class="hero-overlay"></div>
  </div>

  <main class="content-wrap">
    <div class="contact-outer">
      <div class="contact-frosted"></div>
      <div class="contact-card">

        <div class="contact-header">
          <h2 class="card-title">Contact 📬</h2>
        </div>

        <div class="contact-body">

          <div class="contact-links">
            <a href="mailto:bmtuer@gmail.com" class="contact-link contact-link-email">
              Email me <span class="contact-link-arrow">→</span>
            </a>
            <a href="https://www.linkedin.com/in/bryantuer/" target="_blank" class="contact-link contact-link-linkedin">
              LinkedIn <span class="contact-link-arrow">→</span>
            </a>
          </div>

          <p class="contact-form-heading">Leave a note</p>

          <form class="contact-form" action="https://formspree.io/f/xdawbdeq" method="POST">
            <div class="form-field">
              <label for="email">Your email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="form-field">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" placeholder="What's on your mind?" required />
            </div>
            <div class="form-field">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="4" placeholder="Say hello..." required></textarea>
            </div>
            <button type="submit" class="form-submit">Send it →</button>
          </form>

        </div>
      </div>
    </div>
  </main>

  <div class="hero-footer">
    <span class="hero-credit">
      <strong>Baltimore, MD</strong> — Photo by
      <a href="https://unsplash.com/photos/a-view-of-a-city-skyline-at-sunset-XRwb892hC5U" target="_blank">Yianni Mathioudakis</a>
      on Unsplash
    </span>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
